# Replace placeholder OCIDs, names, and image settings before running without --dry-run.

enterprise_solution:
  name: my-enterprise-ai-solution-dev
  compartment_id: ocid1.compartment.oc1..example
  region: eu-frankfurt-1
  region_key: fra

deployments:
  - name: agent-api
    container:
      context: ../../examples/hello_world_container
      dockerfile: Dockerfile
      image_repository: ai-agents/enterprise-ai-agent-api
      tag_strategy: git_sha
      ocir_namespace: auto

    hosted_application:
      display_name: my-agent-api-app-dev
      description: Agent API Hosted Application deployed through OCI Enterprise AI CLI
      create_if_missing: true
      update_if_exists: false

      scaling:
        min_instances: 1
        max_instances: 4
        metric: cpu
        threshold: 70

      networking:
        mode: public

      security:
        auth_type: IDCS_AUTH_CONFIG
        issuer_url: https://idcs.example.identity.oraclecloud.com:443
        audience: my-agent-api
        scopes:
          - my-agent-api/.default

      environment:
        variables:
          LOG_LEVEL: INFO
          OCI_REGION: eu-frankfurt-1
          AGENT_MODE: development
          MCP_SERVER_PORT: "8080"

        secrets:
          API_KEY:
            source: local_env
            env_name: MY_AGENT_API_KEY

    hosted_deployment:
      display_name: my-agent-api-deployment-dev
      create_new_version: true
      activate: true
      wait_for_state: SUCCEEDED

  - name: mcp-server
    container:
      context: ../../examples/hello_world_container
      dockerfile: Dockerfile
      image_repository: ai-agents/enterprise-ai-mcp-server
      tag_strategy: git_sha
      ocir_namespace: auto

    hosted_application:
      display_name: my-mcp-server-app-dev
      description: MCP Server Hosted Application deployed through OCI Enterprise AI CLI
      create_if_missing: true
      update_if_exists: false

      scaling:
        min_instances: 1
        max_instances: 2
        metric: cpu
        threshold: 70

      networking:
        mode: public

      security:
        auth_type: NO_AUTH

      environment:
        variables:
          LOG_LEVEL: INFO
          OCI_REGION: eu-frankfurt-1
          MCP_SERVER_PORT: "8080"

    hosted_deployment:
      display_name: my-mcp-server-deployment-dev
      create_new_version: true
      activate: true
      wait_for_state: SUCCEEDED
